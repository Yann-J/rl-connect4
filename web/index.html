<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Play Connect-4 against an ONNX policy directly in your browser."
    />
    <title>Connect-4 vs ONNX Policy</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Connect-4 vs ONNX Policy" />
    <meta
      property="og:description"
      content="Play Connect-4 against an ONNX policy directly in your browser."
    />
    <meta property="og:image" content="./favicon.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Connect-4 vs ONNX Policy" />
    <meta
      name="twitter:description"
      content="Play Connect-4 against an ONNX policy directly in your browser."
    />
    <meta name="twitter:image" content="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a
      class="github-corner"
      href="https://github.com/yannjouanique/rl-connect4"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="View source code on GitHub"
    >
      <img
        class="github-corner-icon"
        src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/github.svg"
        alt=""
        aria-hidden="true"
      />
      <span>View on GitHub</span>
    </a>
    <main class="app">
      <div class="toolbar">
        <button id="new-human-first">New game (you start)</button>
        <button id="new-ai-first" class="secondary">New game (AI starts)</button>
        <button
          id="open-settings"
          class="icon-button secondary"
          type="button"
          aria-label="Open settings"
          title="Settings"
        >
          <img
            src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/gear.svg"
            alt=""
            aria-hidden="true"
          />
        </button>
      </div>
      <div id="status">Loading ONNX model...</div>
      <section id="board" class="board" aria-label="Connect-4 board"></section>
      <div id="legend" class="legend">🟡 = you  🔴 = policy (`web/policy.onnx`)</div>
    </main>

    <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <div class="modal-content">
        <h2 id="settings-title">Settings</h2>
        <label class="field-label" for="model-name-input">Model file name</label>
        <input id="model-name-input" type="text" placeholder="policy.onnx" />
        <div class="modal-actions">
          <button id="cancel-settings" class="secondary" type="button">Cancel</button>
          <button id="save-settings" type="button">Save</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
