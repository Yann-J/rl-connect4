<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connect-4 vs ONNX Policy</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #12131a;
        color: #eef0f7;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .app { width: min(760px, 95vw); }
      .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        background: #2b7cff;
        color: #fff;
        cursor: pointer;
      }
      button.secondary { background: #2f3242; }
      button:disabled { opacity: 0.55; cursor: not-allowed; }
      #status { margin-bottom: 10px; min-height: 1.4em; }
      .board {
        background: #0f53c9;
        border-radius: 14px;
        padding: 10px;
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 8px;
      }
      .cell {
        width: min(90px, 11vw);
        aspect-ratio: 1 / 1;
        border-radius: 50%;
        border: none;
        background: #1a1c27;
        box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.1);
      }
      .cell.human { background: #f4ce46; }
      .cell.ai { background: #e34747; }
      .cell.playable { outline: 3px solid rgba(255, 255, 255, 0.25); }
      .legend { margin-top: 10px; opacity: 0.85; font-size: 0.9rem; }
      .github-corner {
        position: fixed;
        top: 0;
        right: 0;
        z-index: 10;
        width: 140px;
        padding: 10px 0;
        transform: translate(42px, 24px) rotate(45deg);
        transform-origin: top right;
        text-align: center;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.82rem;
        color: #ffffff;
        background: #24283a;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
      }
      .github-corner:hover {
        background: #2b7cff;
      }
    </style>
  </head>
  <body>
    <a
      class="github-corner"
      href="https://github.com/yannjouanique/rl-connect4"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="View source code on GitHub"
    >
      View on GitHub
    </a>
    <main class="app">
      <div class="toolbar">
        <button id="new-human-first">New game (you start)</button>
        <button id="new-ai-first" class="secondary">New game (AI starts)</button>
      </div>
      <div id="status">Loading ONNX model...</div>
      <section id="board" class="board" aria-label="Connect-4 board"></section>
      <div class="legend">Yellow = you, red = policy (`web/policy.onnx`)</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <script>
      const ROWS = 6;
      const COLS = 7;
      const EMPTY = 0;
      const P1 = 1;
      const P2 = 2;

      const boardEl = document.getElementById("board");
      const statusEl = document.getElementById("status");
      const newHumanFirstBtn = document.getElementById("new-human-first");
      const newAiFirstBtn = document.getElementById("new-ai-first");

      let board = createEmptyBoard();
      let done = false;
      let winner = null;
      let currentPlayer = P1;
      let humanPiece = P1;
      let aiPiece = P2;
      let session = null;

      function createEmptyBoard() {
        return Array.from({ length: ROWS }, () => Array(COLS).fill(EMPTY));
      }

      function legalColumns() {
        const cols = [];
        for (let col = 0; col < COLS; col += 1) {
          if (board[0][col] === EMPTY) cols.push(col);
        }
        return cols;
      }

      function dropPiece(column, piece) {
        for (let row = ROWS - 1; row >= 0; row -= 1) {
          if (board[row][column] === EMPTY) {
            board[row][column] = piece;
            return row;
          }
        }
        return -1;
      }

      function hasConnect4(piece) {
        for (let row = 0; row < ROWS; row += 1) {
          for (let col = 0; col < COLS; col += 1) {
            if (board[row][col] !== piece) continue;
            if (
              col + 3 < COLS &&
              board[row][col + 1] === piece &&
              board[row][col + 2] === piece &&
              board[row][col + 3] === piece
            ) return true;
            if (
              row + 3 < ROWS &&
              board[row + 1][col] === piece &&
              board[row + 2][col] === piece &&
              board[row + 3][col] === piece
            ) return true;
            if (
              row + 3 < ROWS &&
              col + 3 < COLS &&
              board[row + 1][col + 1] === piece &&
              board[row + 2][col + 2] === piece &&
              board[row + 3][col + 3] === piece
            ) return true;
            if (
              row - 3 >= 0 &&
              col + 3 < COLS &&
              board[row - 1][col + 1] === piece &&
              board[row - 2][col + 2] === piece &&
              board[row - 3][col + 3] === piece
            ) return true;
          }
        }
        return false;
      }

      function buildObsForAi() {
        const obs = new Float32Array(2 * ROWS * COLS);
        let idx = 0;
        for (let ch = 0; ch < 2; ch += 1) {
          for (let row = 0; row < ROWS; row += 1) {
            for (let col = 0; col < COLS; col += 1) {
              const value = board[row][col];
              if (ch === 0) obs[idx] = value === aiPiece ? 1 : 0;
              else obs[idx] = value === humanPiece ? 1 : 0;
              idx += 1;
            }
          }
        }
        return obs;
      }

      async function chooseAiColumn() {
        const legal = legalColumns();
        if (legal.length === 0) return -1;

        const obs = new ort.Tensor("float32", buildObsForAi(), [1, 2, ROWS, COLS]);
        const maskData = new Uint8Array(COLS);
        for (const col of legal) maskData[col] = 1;
        const mask = new ort.Tensor("bool", maskData, [1, COLS]);
        const outputs = await session.run({ obs, action_masks: mask });
        const logits = outputs.logits.data;

        let bestCol = legal[0];
        let bestLogit = Number.NEGATIVE_INFINITY;
        for (const col of legal) {
          if (logits[col] > bestLogit) {
            bestLogit = logits[col];
            bestCol = col;
          }
        }
        return bestCol;
      }

      function updateStatus(text) {
        statusEl.textContent = text;
      }

      function gameStateText() {
        if (done) {
          if (winner === humanPiece) return "You win.";
          if (winner === aiPiece) return "AI wins.";
          return "Draw.";
        }
        if (!session) return "Loading ONNX model...";
        return currentPlayer === humanPiece ? "Your turn." : "AI is thinking...";
      }

      function render() {
        boardEl.innerHTML = "";
        const legal = new Set(legalColumns());
        for (let row = 0; row < ROWS; row += 1) {
          for (let col = 0; col < COLS; col += 1) {
            const value = board[row][col];
            const btn = document.createElement("button");
            btn.className = "cell";
            if (value === humanPiece) btn.classList.add("human");
            if (value === aiPiece) btn.classList.add("ai");
            const humanTurn = !done && currentPlayer === humanPiece;
            if (humanTurn && legal.has(col)) {
              btn.classList.add("playable");
              btn.disabled = false;
              btn.title = `Drop in column ${col + 1}`;
              btn.addEventListener("click", () => humanMove(col));
            } else {
              btn.disabled = true;
            }
            boardEl.appendChild(btn);
          }
        }
        updateStatus(gameStateText());
      }

      function applyMove(column, piece) {
        const row = dropPiece(column, piece);
        if (row < 0) return false;
        if (hasConnect4(piece)) {
          done = true;
          winner = piece;
        } else if (legalColumns().length === 0) {
          done = true;
          winner = null;
        } else {
          currentPlayer = piece === P1 ? P2 : P1;
        }
        return true;
      }

      async function maybeAiMove() {
        if (done || currentPlayer !== aiPiece || !session) return;
        render();
        const col = await chooseAiColumn();
        if (col >= 0) applyMove(col, aiPiece);
        render();
      }

      async function humanMove(column) {
        if (done || currentPlayer !== humanPiece) return;
        if (!legalColumns().includes(column)) return;
        applyMove(column, humanPiece);
        render();
        await maybeAiMove();
      }

      async function newGame(humanStarts) {
        board = createEmptyBoard();
        done = false;
        winner = null;
        humanPiece = humanStarts ? P1 : P2;
        aiPiece = humanStarts ? P2 : P1;
        currentPlayer = P1;
        render();
        await maybeAiMove();
      }

      async function loadModel() {
        try {
          session = await ort.InferenceSession.create("./policy.onnx");
          await newGame(true);
        } catch (error) {
          updateStatus(`Failed to load policy.onnx: ${error.message}`);
          render();
        }
      }

      newHumanFirstBtn.addEventListener("click", () => newGame(true));
      newAiFirstBtn.addEventListener("click", () => newGame(false));
      render();
      loadModel();
    </script>
  </body>
</html>
