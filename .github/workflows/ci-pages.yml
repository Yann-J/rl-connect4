name: Train, Export ONNX, and Deploy Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  train-and-export:
    # Use AWS GPUs provisioned by RunsOn
    runs-on: "runs-on=${{ github.run_id }}/family=g4dn.xlarge/image=ubuntu24-gpu-x64"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .

      - name: Startup checks
        run: |
          nvidia-smi
          nvcc --version
          torchinfo --version
          onnxruntime-web --version
          tensorboard --version
          python --version
          pip --version
          pip list
          pip freeze
          pip show onnxruntime-web

      - name: Start TensorBoard server
        run: |
          set -euo pipefail
          mkdir -p /tmp/ci-tensorboard
          tensorboard --logdir runs --host 0.0.0.0 --port 6006 > /tmp/ci-tensorboard/tensorboard.log 2>&1 &
          echo "$!" > /tmp/ci-tensorboard/tensorboard.pid

      - name: Install cloudflared
        run: |
          set -euo pipefail
          curl -L "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64" -o /tmp/cloudflared
          chmod +x /tmp/cloudflared
          sudo mv /tmp/cloudflared /usr/local/bin/cloudflared

      - name: Expose live TensorBoard URL
        run: |
          set -euo pipefail
          cloudflared tunnel --url http://localhost:6006 --no-autoupdate > /tmp/ci-tensorboard/tunnel.log 2>&1 &
          echo "$!" > /tmp/ci-tensorboard/tunnel.pid
          sleep 8
          URL="$(rg -o "https://[-a-zA-Z0-9]+\\.trycloudflare\\.com" /tmp/ci-tensorboard/tunnel.log -m 1 || true)"
          if [ -z "${URL}" ]; then
            echo "Failed to discover Cloudflare tunnel URL."
            exit 1
          fi
          echo "TensorBoard URL: ${URL}"
          echo "### Live TensorBoard" >> "$GITHUB_STEP_SUMMARY"
          echo "${URL}" >> "$GITHUB_STEP_SUMMARY"

      - name: Run training with provided config
        run: python scripts/train_self_play.py --config configs/train_self_play.yaml

      - name: Cleanup TensorBoard tunnel
        if: always()
        run: |
          kill "$(cat /tmp/ci-tensorboard/tunnel.pid)" 2>/dev/null || true
          kill "$(cat /tmp/ci-tensorboard/tensorboard.pid)" 2>/dev/null || true

      - name: Detect run directory
        id: run_dir
        run: |
          set -euo pipefail
          RUN_DIR="$(ls -1d checkpoints/*/ | head -n 1)"
          if [ -z "${RUN_DIR}" ]; then
            echo "No checkpoint directory found under checkpoints/"
            exit 1
          fi
          RUN_NAME="$(basename "${RUN_DIR}")"
          echo "Detected run: ${RUN_NAME}"
          echo "run_name=${RUN_NAME}" >> "$GITHUB_OUTPUT"

      - name: Export ONNX model for web app
        run: >
          python scripts/export_policy_onnx.py --model checkpoints/${{
          steps.run_dir.outputs.run_name }}/final_model.zip --output
          web/policy.onnx

      - name: Build static TensorBoard report
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from tensorboard.backend.event_processing.event_accumulator import EventAccumulator

          log_root = Path("runs")
          report_dir = Path("web/tensorboard")
          report_dir.mkdir(parents=True, exist_ok=True)

          def read_scalars(log_dir: Path):
              accumulator = EventAccumulator(str(log_dir))
              accumulator.Reload()
              data = {}
              for tag in accumulator.Tags().get("scalars", []):
                  events = accumulator.Scalars(tag)
                  data[tag] = [{"step": e.step, "value": e.value} for e in events]
              return data

          runs_data = {}
          if log_root.exists():
              for run_dir in sorted(p for p in log_root.iterdir() if p.is_dir()):
                  runs_data[run_dir.name] = read_scalars(run_dir)

          payload = json.dumps(runs_data)
          html = f"""<!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>TensorBoard Static Report</title>
              <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
              <style>
                body {{ font-family: system-ui, sans-serif; margin: 24px; background: #0b1020; color: #e6e8ef; }}
                h1, h2 {{ margin: 0 0 12px; }}
                .run {{ margin: 24px 0 40px; }}
                .chart {{ background: #121a33; border: 1px solid #273055; border-radius: 8px; padding: 12px; margin: 14px 0; }}
                canvas {{ width: 100% !important; max-height: 340px; }}
              </style>
            </head>
            <body>
              <h1>TensorBoard Static Report</h1>
              <p>Generated from <code>runs/</code> during CI.</p>
              <div id="root"></div>
              <script>
                const runs = {payload};
                const root = document.getElementById("root");
                for (const [runName, tags] of Object.entries(runs)) {{
                  const section = document.createElement("section");
                  section.className = "run";
                  const title = document.createElement("h2");
                  title.textContent = runName;
                  section.appendChild(title);
                  for (const [tag, points] of Object.entries(tags)) {{
                    const wrapper = document.createElement("div");
                    wrapper.className = "chart";
                    const heading = document.createElement("div");
                    heading.textContent = tag;
                    wrapper.appendChild(heading);
                    const canvas = document.createElement("canvas");
                    wrapper.appendChild(canvas);
                    section.appendChild(wrapper);
                    new Chart(canvas.getContext("2d"), {{
                      type: "line",
                      data: {{
                        datasets: [{{
                          label: tag,
                          data: points.map(p => ({{x: p.step, y: p.value}})),
                          borderColor: "#6ea8fe",
                          pointRadius: 0,
                          tension: 0.15,
                        }}],
                      }},
                      options: {{
                        parsing: false,
                        scales: {{
                          x: {{ type: "linear", title: {{ display: true, text: "step" }} }},
                          y: {{ title: {{ display: true, text: "value" }} }},
                        }},
                        plugins: {{ legend: {{ display: true }} }},
                      }},
                    }});
                  }}
                  root.appendChild(section);
                }}
                if (!Object.keys(runs).length) {{
                  root.textContent = "No TensorBoard runs found.";
                }}
              </script>
            </body>
          </html>
          """
          (report_dir / "index.html").write_text(html, encoding="utf-8")
          print(f"Static TensorBoard report generated at {report_dir / 'index.html'}")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    if: github.event_name != 'pull_request'
    needs: train-and-export
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
