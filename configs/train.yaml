run_name: "connect4_maskableppo_v2"

env:
  symmetry_augmentation: true
  randomize_train_agent: true

train:
  total_timesteps: 2M
  learning_rate: 1e-4
  n_steps: 2048
  batch_size: 512
  gamma: 0.99
  num_envs: 8
  features_dim: 256
  cnn_channels: 64
  cnn_res_blocks: 6

self_play:
  checkpoint_freq: 10_000
  max_checkpoints: 20
  mcts_simulations: 50
  mix:
    current: 0.45
    historical: 0.3
    random: 0.1
    mcts: 0.1
    rule_based: 0.05
  phases:
    - start_percent: 0
      mcts_simulations: 50
      mix:
        current: 0.45
        historical: 0.30
        random: 0.10
        mcts: 0.10
        rule_based: 0.05
    - start_percent: 30
      mcts_simulations: 100
      mix:
        current: 0.35
        historical: 0.35
        random: 0.10
        mcts: 0.15
        rule_based: 0.05
    - start_percent: 70
      mcts_simulations: 200
      mix:
        current: 0.25
        historical: 0.35
        random: 0.05
        mcts: 0.30
        rule_based: 0.05

eval:
  eval_freq: 5000
  n_eval_episodes: 200
  mcts_simulations: 200

league:
  n_games_per_pair: 5
  max_policies: 10
  initial_elo: 1000.0
  k_factor: 24.0
