run_name: "connect4_maskableppo_puct_league"

env:
  symmetry_augmentation: true
  randomize_train_agent: true

train:
  total_timesteps: 2M
  learning_rate: 3e-4
  n_steps: 2048
  batch_size: 512
  gamma: 0.99
  num_envs: 8
  features_dim: 256
  cnn_channels: 64
  cnn_res_blocks: 6

self_play:
  checkpoint_freq: 10_000
  max_checkpoints: 20
  mcts_simulations: 100
  puct_simulations: 32
  puct_c_puct: 1.5
  mix:
    current: 0.4
    historical: 0.3
    random: 0
    mcts: 0.25
    puct: 0.05
    rule_based: 0
  phases:
    - start_percent: 0
      mcts_simulations: 50
      puct_simulations: 8
      mix:
        current: 0.5
        historical: 0.2
        random: 0.1
        mcts: 0.1
        puct: 0.1
        rule_based: 0
    - start_percent: 5
      mcts_simulations: 100
      puct_simulations: 16
      mix:
        current: 0.35
        historical: 0.35
        random: 0
        mcts: 0.2
        puct: 0.1
        rule_based: 0
    - start_percent: 10
      mcts_simulations: 200
      puct_simulations: 24
      mix:
        current: 0.3
        historical: 0.3
        random: 0
        mcts: 0.3
        puct: 0.1
        rule_based: 0
    - start_percent: 15
      mcts_simulations: 200
      puct_simulations: 32
      mix:
        current: 0.3
        historical: 0.2
        random: 0
        mcts: 0.4
        puct: 0.1
        rule_based: 0
    - start_percent: 20
      mcts_simulations: 200
      puct_simulations: 48
      mix:
        current: 0.3
        historical: 0.2
        random: 0
        mcts: 0.1
        puct: 0.4
        rule_based: 0

eval:
  eval_freq: 5000
  n_eval_episodes: 200
  mcts_simulations: 200
  puct_simulations: [8, 16, 32, 64]
  random_symmetry: true
  random_side: true
  random_episode_seeds: true
  rng_seed: null

league:
  enabled: true
  n_games_per_pair: 8
  max_policies: 4
  initial_elo: 1000.0
  k_factor: 24.0
