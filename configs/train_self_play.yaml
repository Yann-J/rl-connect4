run_name: "connect4_maskableppo_v1"

env:
  symmetry_augmentation: true

train:
  total_timesteps: 1000000
  learning_rate: 0.0003
  n_steps: 1024
  batch_size: 256
  gamma: 0.99
  features_dim: 128

self_play:
  checkpoint_freq: 10000
  max_checkpoints: 20
  mcts_simulations: 25
  mix:
    current: 0.55
    historical: 0.3
    random: 0.1
    mcts: 0.0
    rule_based: 0.05
  phases:
    - start_timestep: 0
      mcts_simulations: 25
      mix:
        current: 0.55
        historical: 0.25
        random: 0.15
        mcts: 0.0
        rule_based: 0.05
    - start_timestep: 300000
      mcts_simulations: 75
      mix:
        current: 0.45
        historical: 0.30
        random: 0.10
        mcts: 0.10
        rule_based: 0.05
    - start_timestep: 700000
      mcts_simulations: 150
      mix:
        current: 0.25
        historical: 0.40
        random: 0.05
        mcts: 0.25
        rule_based: 0.05

eval:
  eval_freq: 5000
  n_eval_episodes: 50
  mcts_simulations: 200

league:
  n_games_per_pair: 5
  max_policies: 10
  initial_elo: 1000.0
  k_factor: 24.0
