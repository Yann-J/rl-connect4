name: Train, Export ONNX, and Deploy Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_training:
        description: "Run the training pipeline (set false to skip)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  train-and-export:
    # Use AWS GPUs provisioned by RunsOn
    # runs-on: "runs-on=${{ github.run_id }}/family=g4dn.xlarge/image=ubuntu24-gpu-x64"
    runs-on: "ubuntu-latest"
    env:
      TRAINING_ENABLED: >-
        ${{
          vars.CI_DISABLE_TRAINING != 'true' &&
          (github.event_name != 'workflow_dispatch' || inputs.run_training)
        }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect training-related changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            training:
              - "src/**"
              - "config/**"
              - "configs/**"
              - "scripts/**"

      - name: Set up Python
        if: env.TRAINING_ENABLED == 'true' && steps.changes.outputs.training == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: env.TRAINING_ENABLED == 'true' && steps.changes.outputs.training == 'true'
        run: pip install -e .

      - name: Startup checks
        if: env.TRAINING_ENABLED == 'true' && steps.changes.outputs.training == 'true'
        run: |
          nvidia-smi || true
          python --version
          pip --version

      - name: Start TensorBoard server
        if: env.TRAINING_ENABLED == 'true' && steps.changes.outputs.training == 'true'
        run: |
          set -euo pipefail
          mkdir -p /tmp/ci-tensorboard
          tensorboard --logdir runs --host 0.0.0.0 --port 6006 > /tmp/ci-tensorboard/tensorboard.log 2>&1 &
          echo "$!" > /tmp/ci-tensorboard/tensorboard.pid

      - name: Install cloudflared
        if: env.TRAINING_ENABLED == 'true' && steps.changes.outputs.training == 'true'
        run: |
          set -euo pipefail
          curl -L "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64" -o /tmp/cloudflared
          chmod +x /tmp/cloudflared
          sudo mv /tmp/cloudflared /usr/local/bin/cloudflared

      - name: Expose live TensorBoard URL
        if: env.TRAINING_ENABLED == 'true' && steps.changes.outputs.training == 'true'
        run: |
          set -euo pipefail
          cloudflared tunnel --url http://localhost:6006 --no-autoupdate > /tmp/ci-tensorboard/tunnel.log 2>&1 &
          echo "$!" > /tmp/ci-tensorboard/tunnel.pid
          sleep 8
          URL="$(sed -nE 's/.*(https:\/\/[-a-zA-Z0-9]+\.trycloudflare\.com).*/\1/p' /tmp/ci-tensorboard/tunnel.log | head -n 1 || true)"
          if [ -z "${URL}" ]; then
            echo "Failed to discover Cloudflare tunnel URL."
            exit 1
          fi
          echo "TensorBoard URL: ${URL}"
          echo "### Live TensorBoard" >> "$GITHUB_STEP_SUMMARY"
          echo "${URL}" >> "$GITHUB_STEP_SUMMARY"

      - name: Run training with provided config
        if: env.TRAINING_ENABLED == 'true' && steps.changes.outputs.training == 'true'
        run: python scripts/train.py --config configs/train.yaml

      - name: Cleanup TensorBoard tunnel
        if: always() && env.TRAINING_ENABLED == 'true' && steps.changes.outputs.training
          == 'true'

        run: |
          kill "$(cat /tmp/ci-tensorboard/tunnel.pid)" 2>/dev/null || true
          kill "$(cat /tmp/ci-tensorboard/tensorboard.pid)" 2>/dev/null || true

      - name: Detect run directory
        id: run_dir
        if: env.TRAINING_ENABLED == 'true' && steps.changes.outputs.training == 'true'
        run: |
          set -euo pipefail
          RUN_DIR="$(ls -1d checkpoints/*/ | head -n 1)"
          if [ -z "${RUN_DIR}" ]; then
            echo "No checkpoint directory found under checkpoints/"
            exit 1
          fi
          RUN_NAME="$(basename "${RUN_DIR}")"
          echo "Detected run: ${RUN_NAME}"
          echo "run_name=${RUN_NAME}" >> "$GITHUB_OUTPUT"

      - name: Export ONNX model for web app
        if: env.TRAINING_ENABLED == 'true' && steps.changes.outputs.training == 'true'
        run: >
          python scripts/export_policy_onnx.py --model checkpoints/${{
          steps.run_dir.outputs.run_name }}/final_model.zip --output
          web/policy.onnx

      - name: Build static TensorBoard report
        if: env.TRAINING_ENABLED == 'true' && steps.changes.outputs.training == 'true'
        run: python scripts/build_tensorboard_report.py

      - name: Commit updated model artifact
        if: env.TRAINING_ENABLED == 'true' && steps.changes.outputs.training == 'true'
          && github.event_name != 'pull_request' && github.ref ==
          'refs/heads/main'
        run: |
          set -euo pipefail
          if git diff --quiet -- web/policy.onnx; then
            echo "No model artifact update to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/policy.onnx
          git commit -m "ci: update trained policy artifact [skip ci]"
          git push origin HEAD:main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    if: github.event_name != 'pull_request'
    needs: train-and-export
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
